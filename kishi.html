<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>棋士図鑑 — RB将棋アカデミー</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--dark:#1A1A2E;--dark2:#16213E;--gold:#F5C842;--sky:#5BC8E8;--red:#E8354A;--green:#4CAF7D;--muted:#8888aa;--card:#1e1e3a;--border:rgba(245,200,66,.18)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:#fff;font-family:'Zen Maru Gothic',sans-serif;min-height:100vh;padding-bottom:80px;
  background-image:radial-gradient(circle,rgba(245,200,66,.055) 1px,transparent 1px);background-size:24px 24px}
a{text-decoration:none;color:inherit}
.header{background:var(--dark2);border-bottom:2px solid var(--gold);padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.header-back{font-size:1.2rem;cursor:pointer;color:var(--gold)}
.header-title{font-family:'Dela Gothic One',sans-serif;font-size:1.1rem;color:var(--gold)}
.section{padding:0 16px;margin-bottom:24px}
.section-header{display:flex;align-items:center;gap:8px;margin:20px 0 14px}
.section-title{font-family:'Dela Gothic One',sans-serif;font-size:1rem;color:#fff}
.section-badge{font-size:.62rem;background:var(--gold);color:var(--dark);padding:2px 8px;border-radius:20px;font-weight:700}

/* SEARCH */
.search-wrap{padding:14px 16px 4px;position:relative}
.search-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:12px;
  padding:10px 14px 10px 38px;color:#fff;font-size:.82rem;font-family:'Zen Maru Gothic',sans-serif;outline:none;transition:.15s}
.search-input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none}

/* FAVORITE */
.fav-btn{position:absolute;top:10px;right:10px;font-size:1.2rem;cursor:pointer;z-index:5;
  line-height:1;background:none;border:none;padding:4px}
.player-card{position:relative}

/* FILTER */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{font-size:.68rem;border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;
  white-space:nowrap;cursor:pointer;transition:.12s;color:var(--muted);background:transparent;font-family:inherit}
.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,.1)}

/* PLAYER GRID */
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.player-card{background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:18px 14px;cursor:pointer;transition:.15s;
  box-shadow:4px 4px 0 var(--gold);text-align:center}
.player-card:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--gold)}
.player-avatar{font-size:2.6rem;margin-bottom:8px}
.player-name{font-family:'Dela Gothic One',sans-serif;font-size:.95rem;margin-bottom:3px}
.player-title-badge{display:inline-block;font-size:.6rem;background:rgba(245,200,66,.15);
  border:1px solid rgba(245,200,66,.3);color:var(--gold);padding:2px 8px;border-radius:20px;margin-bottom:6px}
.player-era{font-size:.62rem;color:var(--muted)}
.player-style{font-size:.62rem;color:var(--sky);margin-top:4px}

/* DETAIL MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;overflow-y:auto}
.modal-overlay.show{display:block}
.modal{background:var(--dark2);border:2px solid var(--gold);border-radius:18px;margin:20px;
  box-shadow:6px 6px 0 var(--gold)}
.modal-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:center}
.modal-avatar{font-size:3.5rem;line-height:1}
.modal-name{font-family:'Dela Gothic One',sans-serif;font-size:1.4rem;margin-bottom:4px}
.modal-title{font-size:.78rem;color:var(--gold)}
.modal-close{position:absolute;top:24px;right:24px;font-size:1.4rem;cursor:pointer;color:var(--muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 20px 24px}
.info-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.info-label{font-size:.65rem;color:var(--muted);min-width:72px;padding-top:2px}
.info-value{font-size:.8rem;color:#fff;flex:1;line-height:1.5}
.stat-chips{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.stat-chip{text-align:center;background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:10px 12px;min-width:70px}
.stat-chip-num{font-family:'Dela Gothic One',sans-serif;font-size:1.1rem;color:var(--gold)}
.stat-chip-lbl{font-size:.58rem;color:var(--muted);display:block;margin-top:2px}
.section-label{font-family:'Dela Gothic One',sans-serif;font-size:.8rem;color:var(--sky);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.desc-text{font-size:.78rem;line-height:1.8;color:#ccc}
.kifu-links{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.kifu-link-item{background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:.75rem}
.kifu-link-item:hover{border-color:var(--gold)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark2);border-top:2px solid var(--gold);display:flex;z-index:50}
.nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background .12s}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--gold)}
.nav-icon{font-size:1.2rem;line-height:1;color:var(--muted)}
.nav-label{font-size:.58rem;color:var(--muted)}
</style>
</head>
<body>
<header class="header">
  <a href="academy.html" class="header-back">←</a>
  <div class="header-title">棋士図鑑</div>
</header>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" type="text" placeholder="棋士名で検索…" id="searchInput" oninput="onSearch(this.value)">
</div>
<div class="filter-row">
  <button class="filter-btn active" data-cat="all" onclick="filterPlayers('all',this)">全員</button>
  <button class="filter-btn" data-cat="legend" onclick="filterPlayers('legend',this)">伝説</button>
  <button class="filter-btn" data-cat="modern" onclick="filterPlayers('modern',this)">現代</button>
  <button class="filter-btn" data-cat="female" onclick="filterPlayers('female',this)">女流</button>
  <button class="filter-btn" data-cat="fav" onclick="filterPlayers('fav',this)">⭐ お気に入り</button>
</div>

<div class="section">
  <div class="player-grid" id="playerGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="position:relative">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div class="modal-header">
      <div class="modal-avatar" id="m-avatar"></div>
      <div>
        <div class="modal-name" id="m-name"></div>
        <div class="modal-title" id="m-title"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="stat-chips" id="m-chips"></div>
      <div class="info-row"><span class="info-label">生年月日</span><span class="info-value" id="m-born"></span></div>
      <div class="info-row"><span class="info-label">出身地</span><span class="info-value" id="m-place"></span></div>
      <div class="info-row"><span class="info-label">師匠</span><span class="info-value" id="m-master"></span></div>
      <div class="info-row"><span class="info-label">棋風</span><span class="info-value" id="m-style"></span></div>
      <div class="section-label">棋風スコア</div>
      <div id="m-radar" style="margin-bottom:6px"></div>
      <div class="section-label">プロフィール</div>
      <div class="desc-text" id="m-desc"></div>
      <div class="section-label" id="m-quote-label" style="display:none">名言</div>
      <div class="desc-text" id="m-quote" style="color:var(--gold);font-style:italic;border-left:3px solid var(--gold);padding-left:10px"></div>
      <div class="section-label">代表的な棋譜</div>
      <div class="kifu-links" id="m-kifu"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="location.href='academy.html'"><div class="nav-icon">🏠</div><div class="nav-label">ホーム</div></div>
  <div class="nav-item" onclick="location.href='tsume.html'"><div class="nav-icon">🧩</div><div class="nav-label">詰将棋</div></div>
  <div class="nav-item" onclick="location.href='multi.html'"><div class="nav-icon">⚔️</div><div class="nav-label">対局</div></div>
  <div class="nav-item active" onclick="location.href='kishi.html'"><div class="nav-icon">🏆</div><div class="nav-label">棋士</div></div>
  <div class="nav-item" onclick="location.href='kifu.html'"><div class="nav-icon">📜</div><div class="nav-label">棋譜</div></div>
</nav>

<script>

let currentFilter='all';
let currentSearch='';

function getFavs(){return JSON.parse(localStorage.getItem('rb_kishi_favs')||'[]');}
function saveFavs(f){localStorage.setItem('rb_kishi_favs',JSON.stringify(f));}

function toggleFav(id,event){
  event.stopPropagation();
  const favs=getFavs();
  const idx=favs.indexOf(id);
  if(idx>=0)favs.splice(idx,1);else favs.push(id);
  saveFavs(favs);
  renderPlayers(currentFilter);
}

function renderPlayers(filter){
  const grid=document.getElementById('playerGrid');
  const favs=getFavs();
  let list=PLAYERS;
  if(filter==='fav')list=PLAYERS.filter(p=>favs.includes(p.id));
  else if(filter!=='all')list=PLAYERS.filter(p=>p.category===filter);
  if(currentSearch)list=list.filter(p=>p.name.includes(currentSearch)||p.style.includes(currentSearch)||p.title.includes(currentSearch));
  if(list.length===0){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--muted);font-size:.82rem">該当する棋士がいません</div>';
    return;
  }
  grid.innerHTML=list.map(p=>{
    const isFav=favs.includes(p.id);
    return`<div class="player-card" onclick="openModal('${p.id}')">
      <button class="fav-btn" onclick="toggleFav('${p.id}',event)" title="お気に入り">${isFav?'⭐':'☆'}</button>
      <div class="player-avatar">${p.avatar}</div>
      <div class="player-name">${p.name}</div>
      <div class="player-title-badge">${p.title.split('・')[0]}</div>
      <div class="player-era">${p.era}</div>
      <div class="player-style">${p.style.split('・')[0]}</div>
    </div>`;
  }).join('');
}

function filterPlayers(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPlayers(cat);
}

function onSearch(val){
  currentSearch=val.trim();
  renderPlayers(currentFilter);
}

function openModal(id){
  const p=PLAYERS.find(x=>x.id===id);if(!p)return;
  document.getElementById('m-avatar').textContent=p.avatar;
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-title').textContent=p.title;
  document.getElementById('m-born').textContent=p.born;
  document.getElementById('m-place').textContent=p.place;
  document.getElementById('m-master').textContent=p.master||'不明';
  document.getElementById('m-style').textContent=p.style;
  document.getElementById('m-desc').textContent=p.desc;
  document.getElementById('m-chips').innerHTML=p.chips.map(c=>`
    <div class="stat-chip"><div class="stat-chip-num">${c.num}</div><span class="stat-chip-lbl">${c.lbl}</span></div>`).join('');
  // Radar / bar chart
  const radar=document.getElementById('m-radar');
  if(p.radar){
    const keys=Object.keys(p.radar);
    radar.innerHTML=keys.map(k=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        <div style="font-size:.65rem;color:var(--muted);min-width:36px">${k}</div>
        <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${p.radar[k]}%;background:linear-gradient(90deg,var(--sky),var(--gold));border-radius:3px;transition:.6s"></div>
        </div>
        <div style="font-size:.62rem;color:var(--gold);min-width:26px;text-align:right">${p.radar[k]}</div>
      </div>`).join('');
  } else {radar.innerHTML='';}
  // Quote
  const quoteEl=document.getElementById('m-quote');
  const quoteLbl=document.getElementById('m-quote-label');
  if(p.quote){quoteEl.textContent='「'+p.quote+'」';quoteEl.style.display='block';quoteLbl.style.display='block';}
  else{quoteEl.style.display='none';quoteLbl.style.display='none';}
  document.getElementById('m-kifu').innerHTML=`
    <div class="kifu-link-item" onclick="location.href='kifu.html'">
      <span>${p.name}の棋譜を見る</span><span style="color:var(--gold)">›</span>
    </div>`;
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal').scrollTop=0;
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

// Check URL anchor
const hash=location.hash.replace('#','');
if(hash){const p=PLAYERS.find(x=>x.id===hash||x.name.includes(hash));if(p)setTimeout(()=>openModal(p.id),300);}

renderPlayers('all');
</script>
</body>
</html>
